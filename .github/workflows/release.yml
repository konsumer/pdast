name: Release CLI Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            os: linux
            arch: amd64
            use_cross: true
            ext: ''

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            os: linux
            arch: arm64
            use_cross: true
            ext: ''

          - target: x86_64-apple-darwin
            runner: macos-13
            os: macos
            arch: amd64
            use_cross: false
            ext: ''

          - target: aarch64-apple-darwin
            runner: macos-latest
            os: macos
            arch: arm64
            use_cross: false
            ext: ''

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            arch: amd64
            use_cross: false
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --package ast2pd --package pd2ast --package pdast2faust

      - name: Build (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }} --package ast2pd --package pd2ast --package pdast2faust

      - name: Package binaries (zip, Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $ext    = "${{ matrix.ext }}"
          $os     = "${{ matrix.os }}"
          $arch   = "${{ matrix.arch }}"
          $bins   = @("ast2pd", "pd2ast", "pdast2faust")
          $stage  = "pdast-${os}-${arch}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          foreach ($bin in $bins) {
            Copy-Item "target\$target\release\$bin$ext" "$stage\$bin$ext"
          }
          Compress-Archive -Path "$stage\*" -DestinationPath "$stage.zip"

      - name: Package binaries (zip, macOS)
        if: matrix.os == 'macos'
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          OS="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"
          BINS=(ast2pd pd2ast pdast2faust)
          STAGE="pdast-${OS}-${ARCH}"
          mkdir -p "$STAGE"
          for BIN in "${BINS[@]}"; do
            cp "target/${TARGET}/release/${BIN}" "${STAGE}/${BIN}"
          done
          zip -r "${STAGE}.zip" "$STAGE"

      - name: Package binaries (tar.gz, Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          OS="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"
          BINS=(ast2pd pd2ast pdast2faust)
          STAGE="pdast-${OS}-${ARCH}"
          mkdir -p "$STAGE"
          for BIN in "${BINS[@]}"; do
            cp "target/${TARGET}/release/${BIN}" "${STAGE}/${BIN}"
          done
          tar czf "${STAGE}.tar.gz" "$STAGE"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: pdast-${{ matrix.os }}-${{ matrix.arch }}.*
