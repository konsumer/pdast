name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Required for the github-pages deployment environment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new push comes in
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: wasm-pack build --target web pdast --features wasm-js

      - name: Run tests
        run: cargo test --workspace

      # Assemble dist/:
      #   dist/
      #   ├── index.html
      #   ├── components/
      #   └── pdast/          ← WASM package (imported as ../pdast/pdast.js
      #                          relative to components/, works at any URL prefix)
      - name: Assemble site
        run: |
          mkdir -p dist/pdast dist/components
          cp web/index.html dist/
          cp -r web/components/. dist/components/
          cp -r pdast/pkg/. dist/pdast/
          # Prevent Jekyll from processing the site (required for _ files and WASM)
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
