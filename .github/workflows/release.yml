name: Release CLI Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            os: linux
            arch: amd64
            use_cross: true
            ext: ''

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            os: linux
            arch: arm64
            use_cross: true
            ext: ''

          - target: x86_64-apple-darwin
            runner: macos-13
            os: macos
            arch: amd64
            use_cross: false
            ext: ''

          - target: aarch64-apple-darwin
            runner: macos-latest
            os: macos
            arch: arm64
            use_cross: false
            ext: ''

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            arch: amd64
            use_cross: false
            ext: '.exe'


    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --package ast2pd --package pd2ast --package pdast2faust

      - name: Build (cargo)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }} --package ast2pd --package pd2ast --package pdast2faust

      - name: Package binaries
        shell: bash
        run: |
          BINS=(ast2pd pd2ast pdast2faust)
          EXT="${{ matrix.ext }}"
          OS="${{ matrix.os }}"
          ARCH="${{ matrix.arch }}"
          TARGET="${{ matrix.target }}"
          OUTDIR="release-artifacts"
          mkdir -p "$OUTDIR"

          for BIN in "${BINS[@]}"; do
            SRC="target/${TARGET}/release/${BIN}${EXT}"
            DEST="${OUTDIR}/${BIN}-${OS}-${ARCH}${EXT}"
            cp "$SRC" "$DEST"
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
